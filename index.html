<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>META STACK V3 - PRECISÃO</title>
    <style>
        body { margin: 0; background: #020205; overflow: hidden; touch-action: none; font-family: 'Orbitron', sans-serif; }
        #ui { position: absolute; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .monitor { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 255, 204, 0.1); border: 1px solid #00ffcc; padding: 15px; border-radius: 8px; backdrop-filter: blur(10px); display: flex; gap: 30px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        .data { text-align: center; }
        .label { font-size: 10px; color: #00ffcc; text-transform: uppercase; opacity: 0.7; }
        .val { font-size: 20px; color: #fff; font-weight: bold; text-shadow: 0 0 10px #00ffcc; }
        #combo { position: absolute; top: 120px; left: 50%; transform: translateX(-50%); font-size: 40px; color: #fff; display: none; text-shadow: 0 0 20px #00ffcc; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="ui">
        <div class="monitor">
            <div class="data"><div class="label">Meta Acumulada</div><div class="val">R$ <span id="bal">0.00</span></div></div>
            <div class="data"><div class="label">Nível da Torre</div><div class="val" id="lvl">0</div></div>
        </div>
        <div id="combo">PERFEITO!</div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, stack = [], gameActive = true, score = 0, balance = 0;
        const boxH = 1;
        let speed = 0.12;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020205, 0.15); // Neblina para profundidade
            
            camera = new THREE.OrthographicCamera(window.innerWidth/-150, window.innerWidth/150, window.innerHeight/150, window.innerHeight/-150, -100, 1000);
            camera.position.set(4, 4, 4); camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x404040, 2); scene.add(ambient);
            const light = new THREE.DirectionalLight(0x00ffcc, 1); light.position.set(5, 10, 5); scene.add(light);

            addBlock(0, 0, 3, 3); // Base
            spawnNext();
            loop();
        }

        function addBlock(x, z, w, d) {
            const geo = new THREE.BoxGeometry(w, boxH, d);
            const mat = new THREE.MeshPhongMaterial({ 
                color: score % 2 === 0 ? 0x00ffcc : 0x0088ff,
                emissive: 0x002222,
                shininess: 100
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, stack.length * boxH, z);
            scene.add(mesh);
            stack.push({ mesh, w, d });
        }

        function spawnNext() {
            const last = stack[stack.length - 1];
            addBlock(-6, last.mesh.position.z, last.w, last.d);
        }

        function loop() {
            if (!gameActive) return;
            let current = stack[stack.length - 1].mesh;
            current.position.x += speed;

            if (current.position.x > 6) endGame();

            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }

        window.onclick = () => {
            if (!gameActive) return;
            const cur = stack[stack.length - 1];
            const prev = stack[stack.length - 2];
            
            const diff = cur.mesh.position.x - prev.mesh.position.x;
            const absDiff = Math.abs(diff);

            if (absDiff >= prev.w) return endGame();

            // Lógica de "Corte" [cite: 2026-02-28]
            const newW = prev.w - absDiff;
            const newX = prev.mesh.position.x + diff / 2;

            cur.mesh.scale.x = newW / cur.w;
            cur.mesh.position.x = newX;
            cur.w = newW;

            // Feedback de Precisão [cite: 2026-02-13]
            if(absDiff < 0.1) {
                showCombo();
                balance += 0.80; // Combo dobra o ganho
            } else {
                balance += 0.40;
            }

            score++;
            speed += 0.005; // Dificuldade progressiva [cite: 2026-01-19]
            document.getElementById('bal').innerText = balance.toFixed(2);
            document.getElementById('lvl').innerText = score;
            
            camera.position.y += boxH;
            spawnNext();
        };

        function showCombo() {
            const el = document.getElementById('combo');
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 500);
        }

        function endGame() { 
            gameActive = false; 
            alert("ALERTA: Margem de erro excedida. Score Final: " + score);
            location.reload(); 
        }

        init();
    </script>
</body>
</html>

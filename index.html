<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>META STACK - ULTIMATE 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #020205; overflow: hidden; touch-action: none; font-family: 'Orbitron', sans-serif; }
        #ui { position: absolute; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* Interface de Vidro Industrial [cite: 2026-02-03] */
        .hud-panel { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 255, 204, 0.05); border: 2px solid #00ffcc; padding: 15px 40px; border-radius: 4px; backdrop-filter: blur(10px); display: flex; gap: 40px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); }
        .stat-group { text-align: center; }
        .label { font-size: 10px; color: #00ffcc; opacity: 0.6; letter-spacing: 2px; }
        .value { font-size: 24px; color: #fff; text-shadow: 0 0 10px #00ffcc; font-weight: bold; }

        /* Log de Erros [cite: 2026-01-23] */
        #log { position: absolute; bottom: 20px; left: 20px; font-size: 10px; color: #00ffcc; opacity: 0.5; font-family: monospace; }

        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; text-align: center; background: #000; border: 4px solid #ff0055; padding: 50px; z-index: 100; box-shadow: 0 0 50px #ff0055; }
        #perfect-hit { position: absolute; top: 30%; left: 50%; transform: translateX(-50%); font-size: 60px; color: #fff; text-shadow: 0 0 30px #00ffcc; display: none; font-weight: 900; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="hud-panel">
            <div class="stat-group"><div class="label">CREDITS_META</div><div class="value" id="bal">R$ 0.00</div></div>
            <div class="stat-group"><div class="label">ALTITUDE_LVL</div><div class="value" id="lvl">0</div></div>
        </div>
        <div id="perfect-hit">PERFECT!</div>
        <div id="log">SISTEMA_OPERACIONAL: AGUARDANDO_INPUT...</div>
    </div>

    <div id="msg">
        <h1 style="color:#ff0055; margin:0;">ESTRUTURA ROMPIDA</h1>
        <p style="color:#fff;">O cálculo falhou no nível <span id="final-lvl"></span></p>
        <button onclick="location.reload()" style="background:#ff0055; border:none; padding:15px 30px; color:#fff; font-weight:bold; cursor:pointer; font-family:'Orbitron';">REINICIAR OPERAÇÃO</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- ÁUDIO E VIBRAÇÃO [cite: 2026-02-13] ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, dur = 0.2, type = 'triangle') {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
        }

        let scene, camera, renderer, stack = [], gameActive = true, score = 0, balance = 0, speed = 0.12;
        let particles = [], starField;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020205, 0.1);
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(6, 6, 6);
            camera.lookAt(0, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // CENÁRIO: ESTRELAS/POEIRA [cite: 2026-02-13]
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<1000; i++) starPos.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x00ffcc, size: 0.05 }));
            scene.add(starField);

            scene.add(new THREE.AmbientLight(0xffffff, 0.3));
            const sun = new THREE.DirectionalLight(0x00ffcc, 1); sun.position.set(5, 10, 7); scene.add(sun);

            addBlock(0, 3, 3); spawnNext();
            animate();
        }

        function addBlock(y, w, d) {
            // Material Industrial Refinado [cite: 2026-02-13]
            const geo = new THREE.BoxGeometry(w, 1, d);
            const mat = new THREE.MeshPhongMaterial({ 
                color: score % 2 === 0 ? 0x00ffcc : 0x0088ff,
                emissive: 0x001111,
                shininess: 100
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(0, y, 0);
            scene.add(mesh);
            stack.push({ mesh, w, d });
        }

        function spawnNext() {
            const last = stack[stack.length-1];
            addBlock(stack.length, last.w, last.d);
            stack[stack.length-1].mesh.position.x = -6;
        }

        function animate() {
            if (!gameActive) return;
            const top = stack[stack.length-1].mesh;
            top.position.x += speed;

            // Movimento de Câmera Suave [cite: 2026-02-28]
            camera.position.y += ( (stack.length + 4) - camera.position.y ) * 0.05;
            camera.lookAt(0, stack.length - 2, 0);
            starField.position.y = camera.position.y - 5;

            if (top.position.x > 6) gameOver();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.onclick = (e) => {
            if (!gameActive) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const cur = stack[stack.length-1], prev = stack[stack.length-2];
            const diff = cur.mesh.position.x - prev.mesh.position.x;
            const absDiff = Math.abs(diff);

            if (absDiff >= prev.w) return gameOver();

            // LÓGICA DE GANHO E FEEDBACK [cite: 2026-01-19, 2026-02-13]
            if (absDiff < 0.15) {
                balance += 0.80; flashPerfect();
                playSfx(440 + (score * 20), 0.3, 'sine');
                if(navigator.vibrate) navigator.vibrate([40, 40, 40]);
                document.getElementById('log').innerText = "STATUS: PRECISÃO_CRÍTICA_ATINGIDA";
            } else {
                balance += 0.40;
                playSfx(220 + (score * 10));
                if(navigator.vibrate) navigator.vibrate(20);
                document.getElementById('log').innerText = "STATUS: MARGEM_DE_ERRO_ACEITÁVEL";
            }

            const newW = prev.w - absDiff;
            cur.mesh.scale.x = newW / cur.w;
            cur.mesh.position.x = prev.mesh.position.x + diff/2;
            cur.w = newW;

            score++; speed += 0.005;
            document.getElementById('bal').innerText = "R$ " + balance.toFixed(2);
            document.getElementById('lvl').innerText = score;
            spawnNext();
        };

        function flashPerfect() {
            const el = document.getElementById('perfect-hit');
            el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 500);
        }

        function gameOver() {
            gameActive = false;
            playSfx(100, 0.5, 'sawtooth');
            if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
            document.getElementById('final-lvl').innerText = score;
            document.getElementById('msg').style.display = 'block';
        }

        init();
    </script>
</body>
</html>

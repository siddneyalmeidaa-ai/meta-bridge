<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>META STACK V4 - SENSORIAL</title>
    <style>
        body { margin: 0; background: #020205; overflow: hidden; touch-action: none; font-family: 'Orbitron', sans-serif; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .monitor { background: rgba(0, 255, 204, 0.1); border: 1px solid #00ffcc; padding: 15px; border-radius: 8px; backdrop-filter: blur(10px); display: inline-flex; gap: 30px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        .val { font-size: 20px; color: #fff; font-weight: bold; text-shadow: 0 0 10px #00ffcc; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; background: rgba(255, 0, 85, 0.1); border: 2px solid #ff0055; padding: 40px; text-align: center; backdrop-filter: blur(15px); color: white; z-index: 100; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="ui">
        <div class="monitor">
            <div><div style="font-size: 10px; color: #00ffcc;">META</div><div class="val">R$ <span id="bal">0.00</span></div></div>
            <div><div style="font-size: 10px; color: #00ffcc;">COMBO</div><div class="val" id="lvl">0</div></div>
        </div>
    </div>
    <div id="msg">
        <h1 style="text-shadow: 0 0 15px #ff0055;">SISTEMA FALHOU</h1>
        <button onclick="location.reload()" style="background:#00ffcc; border:none; padding:10px 20px; font-weight:bold; cursor:pointer;">REINICIAR</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- MOTOR DE ÁUDIO SINTETIZADO [cite: 2026-02-13] ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type = 'sine', duration = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        let scene, camera, renderer, stack = [], gameActive = true, score = 0, balance = 0, speed = 0.12;

        function init() {
            scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0x020205, 0.15);
            camera = new THREE.OrthographicCamera(window.innerWidth/-150, window.innerWidth/150, window.innerHeight/150, window.innerHeight/-150, -100, 1000);
            camera.position.set(4, 4, 4); camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.DirectionalLight(0x00ffcc, 1); light.position.set(5, 10, 5); scene.add(light);
            addBlock(0, 0, 3, 3); spawnNext(); loop();
        }

        function addBlock(x, z, w, d) {
            const mat = new THREE.MeshPhongMaterial({ color: score % 2 === 0 ? 0x00ffcc : 0x0088ff });
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 1, d), mat);
            mesh.position.set(x, stack.length, z); scene.add(mesh);
            stack.push({ mesh, w, d });
        }

        function spawnNext() { addBlock(-6, stack[stack.length-1].mesh.position.z, stack[stack.length-1].w, stack[stack.length-1].d); }

        function loop() {
            if (!gameActive) return;
            stack[stack.length-1].mesh.position.x += speed;
            if (stack[stack.length-1].mesh.position.x > 6) endGame();
            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }

        window.onclick = () => {
            if (!gameActive) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const cur = stack[stack.length-1], prev = stack[stack.length-2];
            const diff = cur.mesh.position.x - prev.mesh.position.x;
            const absDiff = Math.abs(diff);

            if (absDiff >= prev.w) return endGame();

            // VIBRAÇÃO E SOM [cite: 2026-02-13]
            if (absDiff < 0.15) { // PERFECT
                if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
                playTone(440 + (score * 20), 'triangle', 0.2); 
                balance += 0.80;
            } else {
                if(navigator.vibrate) navigator.vibrate(20);
                playTone(220, 'sine', 0.1);
                balance += 0.40;
            }

            // AJUSTE DE TAMANHO
            const newW = prev.w - absDiff;
            cur.mesh.scale.x = newW / cur.w;
            cur.mesh.position.x = prev.mesh.position.x + diff/2;
            cur.w = newW;

            score++; speed += 0.004;
            document.getElementById('bal').innerText = balance.toFixed(2);
            document.getElementById('lvl').innerText = score;
            camera.position.y += 1;
            spawnNext();
        };

        function endGame() {
            gameActive = false;
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            playTone(110, 'sawtooth', 0.5);
            document.getElementById('msg').style.display = 'block';
        }
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>META STACK - PRECISION</title>
    <style>
        body { margin: 0; background: #050508; color: #00ffcc; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #hud { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; }
        .stat { background: rgba(0, 255, 204, 0.1); border: 1px solid #00ffcc; padding: 10px 20px; display: inline-block; border-radius: 4px; backdrop-filter: blur(5px); }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; background: #000; border: 2px solid #ff0055; padding: 30px; }
        button { background: #00ffcc; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="hud">
        <div class="stat">SALDO: R$ <span id="balance">0.00</span> | SCORE: <span id="score">0</span></div>
    </div>
    <div id="msg">
        <h1 style="color:#ff0055">SISTEMA OFFLINE</h1>
        <p>A precisão falhou.</p>
        <button onclick="location.reload()">REINICIAR</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // LÓGICA DE STACK REALISTA [cite: 2026-02-28]
        let scene, camera, renderer, score = 0, balance = 0;
        let stack = [], boxHeight = 1;
        let gameActive = true;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(window.innerWidth / -150, window.innerWidth / 150, window.innerHeight / 150, window.innerHeight / -150, -100, 1000);
            camera.position.set(4, 4, 4);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x050508);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(0, 5, 0);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            addBlock(0, 0, 3, 3); // Bloco Base
            nextBlock();
            animate();
        }

        function addBlock(x, z, w, d) {
            const geometry = new THREE.BoxGeometry(w, boxHeight, d);
            const material = new THREE.MeshPhongMaterial({ color: stack.length % 2 === 0 ? 0x00ffcc : 0x0088ff });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, stack.length * boxHeight, z);
            scene.add(mesh);
            stack.push({ mesh, w, d });
        }

        function nextBlock() {
            const last = stack[stack.length - 1];
            addBlock(-5, last.mesh.position.z, last.w, last.d);
        }

        function animate() {
            if (!gameActive) return;
            const current = stack[stack.length - 1].mesh;
            current.position.x += 0.1 + (score * 0.005); // Acelera com o tempo [cite: 2026-01-27]

            if (current.position.x > 5) gameOver();
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.onclick = () => {
            if (!gameActive) return;
            const current = stack[stack.length - 1];
            const prev = stack[stack.length - 2];
            
            const diff = current.mesh.position.x - prev.mesh.position.x;
            if (Math.abs(diff) >= prev.w) return gameOver();

            score++;
            balance += 0.40; // Seus 40 centavos [cite: 2026-01-19]
            document.getElementById('score').innerText = score;
            document.getElementById('balance').innerText = balance.toFixed(2);

            camera.position.y += boxHeight; // Câmera segue o topo
            nextBlock();
        };

        function gameOver() {
            gameActive = false;
            document.getElementById('msg').style.display = 'block';
        }

        init();
    </script>
</body>
</html>

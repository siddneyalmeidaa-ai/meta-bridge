<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>META STACK - ARCA QUÂNTICA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* FUNDO VIVO E NEBULOSA [cite: 2026-02-13] */
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #050515 0%, #010105 100%);
            overflow: hidden; touch-action: none; 
            font-family: 'Orbitron', sans-serif; color: #fff;
        }
        
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background: radial-gradient(circle, rgba(0,255,204,0.03) 0%, transparent 50%),
                        radial-gradient(circle, rgba(128,0,255,0.03) 0%, transparent 50%);
            animation: nebulaMove 30s linear infinite; z-index: -1;
        }
        @keyframes nebulaMove { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #ui { position: absolute; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* HUD INDUSTRIAL [cite: 2026-02-03] */
        .mission-panel { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(0, 255, 204, 0.03); border: 1px solid rgba(0, 255, 204, 0.3);
            padding: 15px 30px; border-radius: 4px; backdrop-filter: blur(10px);
            display: flex; gap: 30px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.1);
        }
        .m-label { font-size: 8px; color: #00ffcc; letter-spacing: 2px; opacity: 0.7; }
        .m-val { font-size: 22px; font-weight: bold; text-shadow: 0 0 10px #00ffcc; }

        #log { position: absolute; bottom: 20px; left: 20px; font-size: 9px; color: #00ffcc; font-family: monospace; opacity: 0.6; }
        #perfect { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 40px; color: #fff; text-shadow: 0 0 20px #00ffcc; display: none; font-weight: 900; 
        }

        #game-over { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(0,0,0,0.9); border: 2px solid #ff0055; padding: 40px; 
            display: none; pointer-events: auto; text-align: center; border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="mission-panel">
            <div><div class="m-label">ENERGIA_ARCA</div><div class="m-val" id="bal">R$ 0.00</div></div>
            <div style="width:1px; background:rgba(0,255,204,0.2)"></div>
            <div><div class="m-label">ALTITUDE_META</div><div class="m-val" id="lvl">0</div></div>
        </div>
        <div id="perfect">CONEXÃO_ESTÁVEL</div>
        <div id="log">> STATUS: SISTEMA_INICIADO...<br>> LOCAL: ÓRBITA_TERRA_BAIXA</div>
    </div>

    <div id="game-over">
        <h1 style="color:#ff0055; margin:0;">CONEXÃO PERDIDA</h1>
        <p>Dados corrompidos no nível <span id="final-lvl">0</span></p>
        <button onclick="location.reload()" style="background:#00ffcc; border:none; padding:12px 25px; font-family:'Orbitron'; font-weight:bold; cursor:pointer;">REINICIAR PROTOCOLO</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // SENSORIAL: ÁUDIO E VIBRAÇÃO [cite: 2026-02-13]
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, dur=0.2) {
            const o=audioCtx.createOscillator(), g=audioCtx.createGain();
            o.type='sine'; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur);
        }

        let scene, camera, renderer, stack=[], gameActive=true, score=0, balance=0, speed=0.12, stars;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050515, 0.1);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // CENÁRIO: ESTRELAS [cite: 2026-02-13]
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<1500; i++) starPos.push((Math.random()-0.5)*80, (Math.random()-0.5)*80, (Math.random()-0.5)*80);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0x00ffcc, size: 0.06, transparent: true, opacity: 0.6}));
            scene.add(stars);

            // LUZES DE VIVÊNCIA
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));
            const sun = new THREE.DirectionalLight(0x00ffcc, 1); sun.position.set(5, 10, 5); scene.add(sun);

            addBlock(0, 3, 3);
            spawnNext();
            animate();
        }

        // DESIGN DO BLOCO: PADRÃO OURO [cite: 2026-01-11, 2026-03-10]
        function addBlock(y, w, d) {
            const geo = new THREE.BoxGeometry(w, 1, d);
            const mat = new THREE.MeshPhongMaterial({ 
                color: score % 2 === 0 ? 0x00ffcc : 0x0088ff,
                emissive: 0x001111, shininess: 100, transparent: true, opacity: 0.85
            });
            const mesh = new THREE.Mesh(geo, mat);
            
            // Bordas Iluminadas
            const edges = new THREE.EdgesGeometry(geo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color: 0xffffff, transparent:true, opacity:0.3}));
            mesh.add(line);

            mesh.position.set(0, y, 0);
            scene.add(mesh);
            stack.push({ mesh, w, d });
        }

        function spawnNext() {
            const last = stack[stack.length-1];
            addBlock(stack.length, last.w, last.d);
            stack[stack.length-1].mesh.position.x = -6;
        }

        function animate() {
            if (!gameActive) return;
            const top = stack[stack.length-1].mesh;
            top.position.x += speed;

            // CÂMERA CINEMATOGRÁFICA [cite: 2026-02-28]
            camera.position.y += ( (stack.length + 3) - camera.position.y ) * 0.05;
            camera.lookAt(0, stack.length - 2, 0);
            stars.position.y = camera.position.y - 10;
            stars.rotation.y += 0.0005;

            if (top.position.x > 6) endGame();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.onclick = (e) => {
            if (!gameActive || e.target.tagName === 'BUTTON') return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const cur = stack[stack.length-1], prev = stack[stack.length-2];
            const diff = cur.mesh.position.x - prev.mesh.position.x;
            const absDiff = Math.abs(diff);

            if (absDiff >= prev.w) return endGame();

            // LÓGICA DE GANHO (IPI INCLUSO) [cite: 2026-01-28, 2026-01-19]
            if (absDiff < 0.15) {
                balance += 0.80; showPerfect();
                playSfx(440 + (score * 15));
                if(navigator.vibrate) navigator.vibrate([30, 30]);
                document.getElementById('log').innerHTML = `> CONEXÃO_ESTÁVEL: NÍVEL ${score+1}`;
            } else {
                balance += 0.40;
                playSfx(220 + (score * 5));
                if(navigator.vibrate) navigator.vibrate(20);
            }

            const newW = prev.w - absDiff;
            cur.mesh.scale.x = newW / cur.w;
            cur.mesh.position.x = prev.mesh.position.x + diff/2;
            cur.w = newW;

            score++; speed += 0.004;
            document.getElementById('bal').innerText = "R$ " + balance.toFixed(2);
            document.getElementById('lvl').innerText = score;
            spawnNext();
        };

        function showPerfect() {
            const p = document.getElementById('perfect');
            p.style.display = 'block'; setTimeout(()=> p.style.display='none', 600);
        }

        function endGame() {
            gameActive = false;
            playSfx(100, 0.5); if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
            document.getElementById('final-lvl').innerText = score;
            document.getElementById('game-over').style.display = 'block';
        }

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };

        init();
    </script>
</body>
</html>

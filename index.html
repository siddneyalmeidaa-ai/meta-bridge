<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>META STACK - FULL ENVIRONMENT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050508; overflow: hidden; touch-action: none; font-family: 'Orbitron', sans-serif; }
        #ui { position: absolute; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* Painel Industrial [cite: 2026-02-03] */
        .panel { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(180deg, rgba(0,255,204,0.1) 0%, rgba(0,0,0,0.8) 100%); border: 2px solid #00ffcc; padding: 15px 40px; border-radius: 5px; box-shadow: 0 0 20px rgba(0,255,204,0.4); display: flex; gap: 40px; text-align: center; }
        .label { font-size: 9px; color: #00ffcc; letter-spacing: 2px; }
        .val { font-size: 22px; color: #fff; text-shadow: 0 0 10px #00ffcc; font-weight: bold; }

        .shop-trigger { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); pointer-events: auto; background: #000; color: #00ffcc; border: 1px solid #00ffcc; padding: 10px 30px; cursor: pointer; text-transform: uppercase; font-size: 12px; letter-spacing: 3px; box-shadow: 0 0 15px rgba(0,255,204,0.2); }
    </style>
</head>
<body>
    <div id="ui">
        <div class="panel">
            <div><div class="label">CREDIT_META</div><div class="val" id="bal">R$ 0.00</div></div>
            <div><div class="label">ALTITUDE</div><div class="val" id="lvl">0</div></div>
        </div>
        <button class="shop-trigger" onclick="toggleShop()">Acessar Terminal Skins</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, stack = [], gameActive = true, score = 0, balance = 0, speed = 0.12;
        let grid, particles;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050508, 0.1);
            
            camera = new THREE.OrthographicCamera(window.innerWidth/-150, window.innerWidth/150, window.innerHeight/150, window.innerHeight/-150, -100, 1000);
            camera.position.set(4, 4, 4); camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // CENÁRIO: GRADE CYBER [cite: 2026-02-13]
            grid = new THREE.GridHelper(100, 40, 0x00ffcc, 0x111111);
            grid.position.y = -1;
            scene.add(grid);

            // CENÁRIO: PARTÍCULAS [cite: 2026-02-13]
            const partGeo = new THREE.BufferGeometry();
            const pos = [];
            for(let i=0; i<500; i++) { pos.push(Math.random()*20-10, Math.random()*20-10, Math.random()*20-10); }
            partGeo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            particles = new THREE.Points(partGeo, new THREE.PointsMaterial({ color: 0x00ffcc, size: 0.05 }));
            scene.add(particles);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const l = new THREE.DirectionalLight(0x00ffcc, 1); l.position.set(5, 10, 5); scene.add(l);

            addBlock(0, 0, 3, 3); spawnNext();
            animate();
        }

        function addBlock(x, z, w, d) {
            const mat = new THREE.MeshPhongMaterial({ color: score % 2 === 0 ? 0x00ffcc : 0x0088ff, shininess: 100 });
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 1, d), mat);
            mesh.position.set(x, stack.length, z);
            scene.add(mesh);
            stack.push({ mesh, w, d });
        }

        function spawnNext() { addBlock(-6, stack[stack.length-1].mesh.position.z, stack[stack.length-1].w, stack[stack.length-1].d); }

        function animate() {
            if (!gameActive) return;
            const top = stack[stack.length-1].mesh;
            top.position.x += speed;
            
            // Movimentação do cenário para dar "vida" [cite: 2026-02-13]
            grid.position.z = (grid.position.z + 0.05) % 2;
            particles.rotation.y += 0.001;

            if (top.position.x > 6) location.reload();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.onclick = (e) => {
            if (e.target.tagName === 'BUTTON' || !gameActive) return;
            const cur = stack[stack.length-1], prev = stack[stack.length-2];
            const diff = cur.mesh.position.x - prev.mesh.position.x;
            const absDiff = Math.abs(diff);

            if (absDiff >= prev.w) return location.reload();

            // Lógica de Ganho [cite: 2026-01-19]
            balance += (absDiff < 0.15) ? 0.80 : 0.40;
            score++; speed += 0.005;
            
            document.getElementById('bal').innerText = "R$ " + balance.toFixed(2);
            document.getElementById('lvl').innerText = score;

            const newW = prev.w - absDiff;
            cur.mesh.scale.x = newW / cur.w;
            cur.mesh.position.x = prev.mesh.position.x + diff/2;
            cur.w = newW;

            camera.position.y += 1;
            grid.position.y += 1; // Grade sobe com a torre
            spawnNext();
        };

        function toggleShop() {
            alert("TERMINAL ACESSADO: Em breve novos módulos de textura industrial.");
        }

        init();
    </script>
</body>
</html>

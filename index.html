<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>META STACK - PROJETO ARCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #010105; overflow: hidden; touch-action: none; font-family: 'Orbitron', sans-serif; }
        #ui { position: absolute; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; color: #fff; }
        
        /* HUD de Missão [cite: 2026-02-03] */
        .mission-control { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; background: rgba(0,255,204,0.05); padding: 20px; border: 1px solid #00ffcc; backdrop-filter: blur(10px); min-width: 300px; }
        .m-label { font-size: 9px; color: #00ffcc; letter-spacing: 3px; margin-bottom: 5px; }
        .m-val { font-size: 26px; font-weight: bold; text-shadow: 0 0 15px #00ffcc; }
        
        #log { position: absolute; bottom: 20px; left: 20px; font-size: 10px; color: #00ffcc; font-family: monospace; opacity: 0.7; }
        #perfect { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 50px; color: #fff; text-shadow: 0 0 30px #00ffcc; display: none; font-weight: 900; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="mission-control">
            <div class="m-label">OBJETIVO: TRANSMISSÃO QUÂNTICA</div>
            <div style="display: flex; justify-content: space-around;">
                <div><div class="m-label">ENERGIA</div><div class="m-val" id="bal">R$ 0.00</div></div>
                <div><div class="m-label">ALTITUDE</div><div class="m-val" id="lvl">0</div></div>
            </div>
        </div>
        <div id="perfect">CONEXÃO ESTÁVEL!</div>
        <div id="log">> INICIANDO PROTOCOLO ARCA...<br>> AGUARDANDO ALINHAMENTO DE BLOCO...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- MOTOR SENSORIAL [cite: 2026-02-13] ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function sfx(f, d=0.2) {
            const o=audioCtx.createOscillator(), g=audioCtx.createGain();
            o.type='sine'; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d);
        }

        let scene, camera, renderer, stack=[], score=0, balance=0, speed=0.12, gameActive=true;
        let starField;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x010105, 0.1);
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5); camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // CENÁRIO UNIVERSO [cite: 2026-02-13]
            const starGeo = new THREE.BufferGeometry();
            const starPos = [];
            for(let i=0; i<1500; i++) starPos.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
            starField = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0x00ffcc, size: 0.08, transparent: true, opacity: 0.5}));
            scene.add(starField);

            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
            const light = new THREE.DirectionalLight(0x00ffcc, 1); light.position.set(5, 10, 5); scene.add(light);

            addBlock(0, 3, 3); spawnNext();
            animate();
        }

        function addBlock(y, w, d) {
            const geo = new THREE.BoxGeometry(w, 1, d);
            const mat = new THREE.MeshPhongMaterial({ 
                color: score % 2 === 0 ? 0x00ffcc : 0x0088ff,
                emissive: 0x001111, shininess: 100, transparent: true, opacity: 0.9
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(0, y, 0);
            scene.add(mesh);
            stack.push({ mesh, w, d });
        }

        function spawnNext() {
            addBlock(stack.length, stack[stack.length-1].w, stack[stack.length-1].d);
            stack[stack.length-1].mesh.position.x = -6;
        }

        function animate() {
            if (!gameActive) return;
            const top = stack[stack.length-1].mesh;
            top.position.x += speed;

            // Câmera Dinâmica [cite: 2026-02-28]
            camera.position.y += ( (stack.length + 3) - camera.position.y ) * 0.05;
            camera.lookAt(0, stack.length - 2, 0);
            starField.position.y = camera.position.y - 10;
            starField.rotation.y += 0.001;

            if (top.position.x > 6) gameOver();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.onclick = () => {
            if (!gameActive) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const cur=stack[stack.length-1], prev=stack[stack.length-2];
            const diff = cur.mesh.position.x - prev.mesh.position.x;
            const absDiff = Math.abs(diff);

            if (absDiff >= prev.w) return gameOver();

            if (absDiff < 0.15) {
                balance += 0.80; showPerfect();
                sfx(440 + (score*20)); if(navigator.vibrate) navigator.vibrate([30, 30]);
                document.getElementById('log').innerHTML += `<br>> CONEXÃO_ESTÁVEL: NÍVEL ${score}`;
            } else {
                balance += 0.40; sfx(220 + (score*10));
                if(navigator.vibrate) navigator.vibrate(20);
            }

            const newW = prev.w - absDiff;
            cur.mesh.scale.x = newW / cur.w;
            cur.mesh.position.x = prev.mesh.position.x + diff/2;
            cur.w = newW;

            score++; speed += 0.004;
            document.getElementById('bal').innerText = "R$ " + balance.toFixed(2);
            document.getElementById('lvl').innerText = score;
            spawnNext();
        };

        function showPerfect() {
            const p = document.getElementById('perfect');
            p.style.display = 'block'; setTimeout(() => p.style.display = 'none', 600);
        }

        function gameOver() {
            gameActive = false;
            sfx(100, 0.5); if(navigator.vibrate) navigator.vibrate([200, 100]);
            alert("ESTRUTURA ROMPIDA EM ALTITUDE: " + score);
            location.reload();
        }
        init();
    </script>
</body>
</html>

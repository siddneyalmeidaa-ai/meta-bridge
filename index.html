<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>META STACK - NEO FUTURISM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Orbitron', sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; filter: contrast(1.2) brightness(1.1) saturate(1.5); }
        
        /* GHOST HUD: Interface que flutua [cite: 2026-02-03] */
        .ghost-hud {
            position: absolute; top: 40px; right: 40px; text-align: right;
            border-right: 4px solid #00ffcc; padding-right: 20px;
            text-transform: uppercase; pointer-events: none;
            text-shadow: 0 0 15px #00ffcc;
        }
        .data-point { margin-bottom: 15px; }
        .label { font-size: 10px; color: #00ffcc; letter-spacing: 4px; opacity: 0.6; }
        .value { font-size: 32px; font-weight: 900; color: #fff; }

        #fx-overlay {
            position: absolute; width: 100%; height: 100%; pointer-events: none;
            background: radial-gradient(circle, transparent 30%, rgba(0,255,204,0.05) 100%);
            box-shadow: inset 0 0 100px #000;
        }
    </style>
</head>
<body>
    <div id="fx-overlay"></div>
    <div class="ghost-hud">
        <div class="data-point"><div class="label">CREDITS_RESERVE</div><div class="value" id="bal">R$ 0.00</div></div>
        <div class="data-point"><div class="label">ALTITUDE_STAKE</div><div class="value" id="lvl">0</div></div>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, stack = [], score = 0, balance = 0, speed = 0.14, gameActive = true;
        let nebulaParticles = [];

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.05);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(7, 7, 7);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // CENÁRIO: DOBRA ESPACIAL [cite: 2026-02-13]
            const lineMat = new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.2 });
            for(let i=0; i<100; i++) {
                const points = [];
                points.push(new THREE.Vector3(Math.random()*20-10, -20, Math.random()*20-10));
                points.push(new THREE.Vector3(Math.random()*20-10, 40, Math.random()*20-10));
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geo, lineMat);
                scene.add(line);
                nebulaParticles.push(line);
            }

            // LUZES NEO-FUTURISTAS
            const ambient = new THREE.AmbientLight(0xffffff, 0.2); scene.add(ambient);
            const mainLight = new THREE.PointLight(0x00ffcc, 2, 50); mainLight.position.set(10, 20, 10); scene.add(mainLight);
            const purpleLight = new THREE.PointLight(0x8800ff, 2, 50); purpleLight.position.set(-10, -10, -10); scene.add(purpleLight);

            addBlock(0, 3, 3);
            spawnNext();
            animate();
        }

        function addBlock(y, w, d) {
            // Geometria de Bloco com Bordas Chanfradas Internas [cite: 2026-03-10]
            const geo = new THREE.BoxGeometry(w, 0.8, d);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x000000,
                metalness: 1,
                roughness: 0,
                emissive: score % 2 === 0 ? 0x00ffcc : 0x8800ff,
                emissiveIntensity: 0.5,
                transparent: true,
                opacity: 0.7
            });
            const mesh = new THREE.Mesh(geo, mat);

            // BORDAS DE ENERGIA (WIREFRAME ELITE)
            const wireGeo = new THREE.EdgesGeometry(geo);
            const wireMat = new THREE.LineBasicMaterial({ 
                color: score % 2 === 0 ? 0x00ffcc : 0x8800ff, 
                linewidth: 2,
                transparent: true,
                opacity: 0.8
            });
            const wire = new THREE.LineSegments(wireGeo, wireMat);
            mesh.add(wire);

            mesh.position.set(0, y, 0);
            scene.add(mesh);
            stack.push({ mesh, w, d });
        }

        function spawnNext() {
            const last = stack[stack.length-1];
            addBlock(stack.length, last.w, last.d);
            stack[stack.length-1].mesh.position.x = -7;
        }

        function animate() {
            if (!gameActive) return;
            const top = stack[stack.length-1].mesh;
            top.position.x += speed;

            // MOVIMENTO DE CÂMERA DINÂMICO (DRONE MODE) [cite: 2026-02-28]
            const time = Date.now() * 0.001;
            camera.position.x = 7 + Math.sin(time * 0.5) * 0.5;
            camera.position.z = 7 + Math.cos(time * 0.5) * 0.5;
            camera.position.y += ( (stack.length + 4) - camera.position.y ) * 0.05;
            camera.lookAt(0, stack.length - 2, 0);

            // EFEITO DE VELOCIDADE NO FUNDO
            nebulaParticles.forEach(p => {
                p.position.y -= 0.2;
                if(p.position.y < -20) p.position.y = 20;
            });

            if (top.position.x > 7) location.reload();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.onclick = () => {
            if (!gameActive) return;
            const cur = stack[stack.length-1], prev = stack[stack.length-2];
            const diff = cur.mesh.position.x - prev.mesh.position.x;
            const absDiff = Math.abs(diff);

            if (absDiff >= prev.w) return location.reload();

            // Ganho de Risco [cite: 2026-01-19]
            balance += (absDiff < 0.15) ? 0.80 : 0.40;
            score++; speed += 0.005;

            document.getElementById('bal').innerText = "R$ " + balance.toFixed(2);
            document.getElementById('lvl').innerText = score;

            const newW = prev.w - absDiff;
            cur.mesh.scale.x = newW / cur.w;
            cur.mesh.position.x = prev.mesh.position.x + diff/2;
            cur.w = newW;

            spawnNext();
        };

        init();
    </script>
</body>
</html>
